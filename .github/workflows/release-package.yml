name: Release package
on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type (one of): patch, minor, major, prepatch, preminor, premajor, prerelease"
        required: false
        default: "patch"
      custom-version:
        description: "Custom version (e.g. 10.0.0). If provided, release-type is ignored."
        required: false
permissions: write-all
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Checkout project repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      # Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Build & Check code
        run: |
          pnpm build
          pnpm lint
          pnpm test
          pnpm type-check

      # Determine and Bump version
      - name: Bump version
        run: |
          if [ -n "$CUSTOM_VERSION" ]; then
            # If custom version is provided, use it directly
            NEW_VER=$(npm --no-git-tag-version version $CUSTOM_VERSION | tail -n 1)
            
            # Determine tag based on version string (contains '-' means beta)
            if [[ "$CUSTOM_VERSION" == *-* ]]; then
              TAG="beta"
            else
              TAG="latest"
            fi
          else
            # Use release-type logic
            if [[ "$RELEASE_TYPE" == pre* ]]; then
              NEW_VER=$(npm --no-git-tag-version --preid=beta version $RELEASE_TYPE | tail -n 1)
              TAG="beta"
            else
              NEW_VER=$(npm --no-git-tag-version version $RELEASE_TYPE | tail -n 1)
              TAG="latest"
            fi
          fi

          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release-type }}
          CUSTOM_VERSION: ${{ github.event.inputs.custom-version }}

      # Update changelog unreleased section with new version
      - name: Update changelog
        uses: superfaceai/release-changelog-action@v1
        with:
          path-to-changelog: CHANGELOG.md
          version: ${{ env.NEW_VERSION }}
          operation: release

      # Commit changes
      - name: Commit CHANGELOG.md and package.json changes and create tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "package.json"
          git add "CHANGELOG.md"
          git commit -m "chore: release ${{ env.NEW_VERSION }}"
          git tag ${{ env.NEW_VERSION }}

      # Publish version to public repository
      - name: Publish
        run: pnpm publish --access public --tag ${{ env.RELEASE_TAG }} --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_ACCESS_TOKEN }}

      # Push repository changes
      - name: Push changes to repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin && git push --tags

      # Read version changelog
      - id: get-changelog
        name: Get version changelog
        uses: superfaceai/release-changelog-action@v1
        with:
          path-to-changelog: CHANGELOG.md
          version: ${{ env.NEW_VERSION }}
          operation: read

      # Update GitHub release with changelog
      - name: Update GitHub release documentation
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NEW_VERSION }}
          body: ${{ steps.get-changelog.outputs.changelog }}
          prerelease: ${{ startsWith(github.event.inputs.release-type, 'pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
